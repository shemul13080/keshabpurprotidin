<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>প্রো গেমিং জোন - কেশবপুর প্রতিদিন</title>
    <style>
        :root { --neon: #01ff95; --bg: #0b0f19; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        /* মেইন স্লট বক্স */
        .slot-container { width: 350px; border: 2px solid var(--neon); padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px rgba(1, 255, 149, 0.3); text-align: center; }
        
        /* স্কোর বোর্ড */
        .board { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .score { border: 1px solid var(--neon); padding: 5px 10px; border-radius: 8px; font-size: 14px; }

        /* স্লট হুইল */
        .wheel { width: 200px; height: 200px; border-radius: 50%; border: 6px solid #333; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: var(--neon); background: #000; box-shadow: inset 0 0 30px #000; transition: transform 4s ease-out; }

        /* বাটন ও অ্যাড */
        .spin-btn { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .ad-box { margin-top: 20px; min-height: 250px; background: #111; border: 1px dashed #444; }
    </style>
</head>
<body>

<div class="slot-container">
    <h2 style="color: var(--neon);">⚡ PRO GAMING ZONE</h2>
    <div class="board">
        <div class="score">ক্রেডিট: <span id="bal">500</span></div>
        <div class="score">উইন: <span id="win">0</span></div>
    </div>

    <div class="wheel" id="wheel">00</div>

    <div class="ad-box">
        <script type="text/javascript">
          atOptions = { 'key' : '62a2c41178da94703bfa73a15df0c25c', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
        </script>
        <script src="https://www.highperformanceformat.com/62a2c41178da94703bfa73a15df0c25c/invoke.js"></script>
    </div>

    <button class="spin-btn" onclick="spin()">স্পিন করুন</button>
</div>

<script>
    function spin() {
        let wheel = document.getElementById('wheel');
        let val = Math.floor(Math.random() * 99);
        wheel.style.transform = "rotate(3600deg)";
        setTimeout(() => {
            wheel.innerText = val < 10 ? "0" + val : val;
            wheel.style.transform = "rotate(0deg)";
            document.getElementById('win').innerText = val;
        }, 4000);
    }
</script>

<script src="https://pl28890035.effectivegatecpm.com/34/77/18/3477182b5bd3e03d34321fc5128737e6.js"></script>

</body>
</html>
