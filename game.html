<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>প্রো গেমিং জোন | কেশবপুর প্রতিদিন</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://pl28890035.effectivegatecpm.com/34/77/18/3477182b5bd3e03d34321fc5128737e6.js"></script>

    <style>
        :root { --neon: #01ff95; --bg: #0a0e17; }
        body { background-color: var(--bg); color: #fff; font-family: 'Hind Siliguri', sans-serif; margin: 0; padding: 20px; }
        .game-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 768px) { .game-grid { grid-template-columns: repeat(2, 1fr); } }

        .game-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
        .game-card img { width: 100%; height: 100px; border-radius: 10px; object-fit: cover; margin-bottom: 8px; }
        
        /* আকর্ষণীয় প্লে বাটন */
        .play-btn { 
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 20px; background: var(--neon); color: #000; text-decoration: none; 
            border-radius: 25px; font-weight: bold; font-size: 13px; gap: 8px;
            box-shadow: 0 4px 15px rgba(1, 255, 149, 0.3); transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--neon);">⚡ প্রো গেমিং জোন</h1>
        
        <div style="margin: 20px auto; min-height: 250px;">
            <script type="text/javascript">
              atOptions = { 'key' : '62a2c41178da94703bfa73a15df0c25c', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
            </script>
            <script src="https://www.highperformanceformat.com/62a2c41178da94703bfa73a15df0c25c/invoke.js"></script>
        </div>
    </div>

    <div class="game-grid" id="game-list"></div>

    <script>
    const games = ["স্লট কিং", "ফিশ হান্টার", "কার্ড মাস্টার", "লুডু স্টার", "রেসিং ২", "কার রেস", "টেনিস ৩ডি", "শুটার প্রো", "বক্সিং", "ফুটবল", "ক্যান্ডি গেম", "ড্রাগন ফাইট", "গোল্ড রাশ", "মাইনস", "রুলেট", "ব্ল্যাকজ্যাক", "ক্রাশ গেম", "আইস ব্রেকার", "জঙ্গলে অ্যাডভেঞ্চার", "স্পেস মিশন"];
    
    const container = document.getElementById('game-list');
    
    games.forEach((game, i) => {
        // এখানে i + 1 মানে হলো ১ থেকে ২০ পর্যন্ত ছবির নাম
        let imagePath = `images/${i + 1}.jpg`;
        
        container.innerHTML += `
            <div class="game-card">
                <img src="${imagePath}" 
                     onerror="this.src='https://via.placeholder.com/300x200?text=Image+Missing'" 
                     alt="${game}">
                <p style="margin:5px 0; font-size:13px; color:#fff;">${game}</p>
                <a href="#" class="play-btn"><i class="fas fa-play"></i> খেলুন</a>
            </div>
        `;
    });
</script>
</body>
</html>
